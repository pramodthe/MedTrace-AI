<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Swin-LiteMedSAM Basic UI</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 20px; background:#111; color:#eee; }
    .row { display:flex; gap:20px; flex-wrap:wrap; }
    .panel { background:#1b1b1b; padding:12px; border-radius:8px; }
    canvas, img { max-width: 100%; border:1px solid #444; }
    button { padding:8px 12px; margin-top:8px; }
    #status { margin-top:10px; color:#9ad; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>Swin-LiteMedSAM Basic Frontend</h2>
  <p>Upload an image, then click-and-drag a rectangle on the left image, then click Segment.</p>

  <input id="file" type="file" accept="image/*" />
  <div class="row">
    <div class="panel">
      <div>Input + drag box</div>
      <canvas id="canvas"></canvas><br/>
      <button id="segment">Segment</button>
      <div id="coords"></div>
    </div>
    <div class="panel">
      <div>Overlay output</div>
      <img id="out" alt="overlay output" />
    </div>
  </div>
  <div id="status">Ready.</div>

<script>
const fileInput = document.getElementById('file');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const out = document.getElementById('out');
const statusEl = document.getElementById('status');
const coordsEl = document.getElementById('coords');

let img = new Image();
let dragging = false;
let startX = 0, startY = 0;
let rect = null;
let fileBlob = null;

function setStatus(s){ statusEl.textContent = s; }

function draw() {
  if (!img.width) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  if (rect) {
    ctx.strokeStyle = '#ff4040';
    ctx.lineWidth = 2;
    ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);
  }
}

function clampRect(r){
  let x = Math.max(0, Math.min(canvas.width-1, r.x));
  let y = Math.max(0, Math.min(canvas.height-1, r.y));
  let w = Math.max(1, Math.min(canvas.width-x, r.w));
  let h = Math.max(1, Math.min(canvas.height-y, r.h));
  return {x,y,w,h};
}

canvas.addEventListener('mousedown', (e) => {
  if (!img.width) return;
  const b = canvas.getBoundingClientRect();
  startX = e.clientX - b.left;
  startY = e.clientY - b.top;
  dragging = true;
  rect = {x:startX, y:startY, w:1, h:1};
  draw();
});

canvas.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const b = canvas.getBoundingClientRect();
  const x = e.clientX - b.left;
  const y = e.clientY - b.top;
  rect = {
    x: Math.min(startX, x),
    y: Math.min(startY, y),
    w: Math.abs(x - startX),
    h: Math.abs(y - startY)
  };
  draw();
});

window.addEventListener('mouseup', () => {
  if (!dragging) return;
  dragging = false;
  if (rect) rect = clampRect(rect);
  draw();
  if (rect) {
    coordsEl.textContent = `Rect: x=${Math.round(rect.x)} y=${Math.round(rect.y)} w=${Math.round(rect.w)} h=${Math.round(rect.h)}`;
  }
});

fileInput.addEventListener('change', () => {
  const f = fileInput.files[0];
  if (!f) return;
  fileBlob = f;
  const url = URL.createObjectURL(f);
  img.onload = () => {
    canvas.width = img.width;
    canvas.height = img.height;
    rect = null;
    draw();
    setStatus('Image loaded. Draw a rectangle and click Segment.');
  };
  img.src = url;
});

document.getElementById('segment').addEventListener('click', async () => {
  if (!fileBlob) return setStatus('Upload an image first.');
  if (!rect) return setStatus('Draw a rectangle first.');

  const xMin = Math.round(rect.x);
  const yMin = Math.round(rect.y);
  const xMax = Math.round(rect.x + rect.w);
  const yMax = Math.round(rect.y + rect.h);

  const fd = new FormData();
  fd.append('file', fileBlob);
  fd.append('x_min', xMin);
  fd.append('y_min', yMin);
  fd.append('x_max', xMax);
  fd.append('y_max', yMax);

  setStatus('Segmenting...');
  try {
    const res = await fetch('/segment', { method:'POST', body:fd });
    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error(e.detail || `HTTP ${res.status}`);
    }
    const blob = await res.blob();
    out.src = URL.createObjectURL(blob);
    setStatus('Done.');
  } catch (e) {
    setStatus('Error: ' + e.message);
  }
});
</script>
</body>
</html>
